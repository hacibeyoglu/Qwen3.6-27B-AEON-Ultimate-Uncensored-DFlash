# docker-compose.main-validation.yml — vLLM-main image validation (2026-07-16)
#
# Boots the locally-built aeon-vllm-ultimate:main20260715 image (vLLM main @ 2bd895762,
# merged onto the AEON tree — see vllm-ultimate-dgx-spark/SOURCE.md) against the SAME
# XS-body + DFlash drafter pair used in docker-compose.spark-xs.yml. The serve flags below
# are intentionally IDENTICAL to that known-good config so the image is the only variable —
# this is an A/B, not a retune. Do not add throughput flags (nvfp4 KV, higher gpu-mem-util,
# larger batch) until this passes the correctness/stability gates below.
#
# Why this exists: main drops every V1 DFlash carry (#40898/#41703/#43982-port) in favor of
# upstream's native hybrid-SWA DFlash on Model-Runner-V2 (#47914/#48135). The z-lab
# Qwen3.6-27B drafter is 4-of-5-layers sliding-window, so vLLM main auto-routes it to V2 —
# do NOT set VLLM_USE_V2_MODEL_RUNNER (unset = auto-select; setting =0 would break DFlash on
# this tree, there is no V1 fallback for a hybrid SWA/full drafter anymore).
#
# Runs on a different port/container/cache volume than the production stack so both can
# exist side by side. No production container was found running at compose-write time.
#
# Start:
#   docker compose -f docker-compose.main-validation.yml up -d
#   docker compose -f docker-compose.main-validation.yml logs -f vllm-main
#
# First boot: expect ~10-15 min (FlashInfer NVFP4 GEMM autotune + CUDA-graph capture on a
# fresh cache volume). Watch the boot log for confirmation the V2 runner was actually
# selected (see "Validation checklist" below).
#
# Stop / clean up:
#   docker compose -f docker-compose.main-validation.yml down
#   docker volume rm qwen36-27b-aeon-ultimate-uncensored-dflash_vllm-cache-main

services:
  vllm-main:
    image: aeon-vllm-ultimate:main20260715
    container_name: aeon-ultimate-main-validation
    restart: "no"          # validation run — don't auto-restart on crash, we want to see it
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1

    environment:
      # ─── Core vLLM ───
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # ─── Suppress transformers `use_fast` deprecation warning ───
      - TRANSFORMERS_BACKEND=pil

      # ─── GB10 / sm_121a runtime ───
      - TORCH_CUDA_ARCH_LIST=12.1a
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_MATMUL_PRECISION=high
      - NVIDIA_FORWARD_COMPAT=1
      - NVIDIA_DISABLE_REQUIRE=1

      # ─── FP4 path selection ───
      - VLLM_TEST_FORCE_FP8_MARLIN=0
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # NOT setting (dead on main — removed in v0.24.0, README breaking-change note):
      #   VLLM_NVFP4_GEMM_BACKEND, VLLM_USE_FLASHINFER_MOE_FP4, ENABLE_NVFP4_SM100
      #   (ENABLE_NVFP4_SM100 is a build-time-only var baked into the image; irrelevant here)
      # NOT setting VLLM_USE_V2_MODEL_RUNNER — see header. This is the whole point of the test.

    volumes:
      # Same XS multimodal body + drafter as the production spark-xs config (read-only).
      - ./models/aeon-ultimate-multimodal-nvfp4-mtp-xs:/models/xs:ro
      - ./models/dflash-drafter:/models/dflash-drafter:ro
      # Separate autotune/compile cache — do NOT share the production cache volume; this
      # build's kernels and V2 runner graphs are a different artifact set.
      - vllm-cache-main:/root/.cache/vllm

    # Same entrypoint-concatenation gotcha as the production image (ENTRYPOINT is exec-form
    # ["/bin/bash"], so `command: [bash, -c, ...]` would double up bash and crash — see
    # docker-compose.spark-xs.yml's note). Override the entrypoint instead.
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        exec vllm serve /models/xs \
          --served-model-name qwen3.6-27b \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization modelopt \
          --kv-cache-dtype auto \
          --mamba-cache-dtype float32 \
          --max-model-len 262144 \
          --max-num-seqs 64 \
          --max-num-batched-tokens 16384 \
          --gpu-memory-utilization 0.70 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --generation-config vllm \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --attention-backend flash_attn \
          --limit-mm-per-prompt '{"image": 4, "video": 2}' \
          --mm-encoder-tp-mode data \
          --mm-processor-cache-type shm \
          --mm-shm-cache-max-object-size-mb 256 \
          --speculative-config '{"method":"dflash","model":"/models/dflash-drafter","num_speculative_tokens":10}'

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  vllm-cache-main:
