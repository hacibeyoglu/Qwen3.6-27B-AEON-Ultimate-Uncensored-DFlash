# docker-compose.spark-xs.yml — DGX Spark winning config (2026-04-28)
#
# This is the **highest-throughput single-stream config measured on DGX Spark** to date:
#   median  37.6 tok/s  (vs prior production 32.5)
#   peak    68.7 tok/s  (vs prior production 56.7)
#   median TTFT  266 ms  (vs prior production 325 ms)
#   mean DFlash accepted length per round  2.60 (vs prior 2.0–2.3)
#
# Two changes vs the original docker-compose.yml stack:
#   1. Model body: -Multimodal-NVFP4-MTP-XS (modelopt format) instead of -NVFP4 (compressed-tensors).
#      The XS body's NVFP4-quantized linear_attn projections share the same dispatch path as the
#      rest of the body — one fewer BF16↔FP4 cast per layer per token. The smaller in-memory
#      footprint also frees Spark unified-memory bandwidth for KV/spec-decode work.
#   2. DFlash drafter: z-lab/Qwen3.6-27B-DFlash refreshed on 2026-04-27 (same 3.46 GB size,
#      different weights). Mean accepted length jumped from 2.0–2.3 to 2.60.
#
# The XS body's grafted MTP head sits unused in this path (~0.85 GB of dead weight in the
# safetensors). On Spark, DFlash decisively beats MTP on the same body — see Performance
# section in README.md for the head-to-head numbers.
#
# Image:       ghcr.io/aeon-7/vllm-aeon-ultimate-dflash:qwen36-v3 (same image as docker-compose.yml)
# Hardware:    DGX Spark (NVIDIA GB10, 128 GB unified memory, sm_121a)
#
# Required downloads (run once):
#   hf auth login                                          # if not already authenticated
#   hf download AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS \
#     --local-dir ./models/aeon-ultimate-multimodal-nvfp4-mtp-xs
#   hf download z-lab/Qwen3.6-27B-DFlash \
#     --local-dir ./models/dflash-drafter
#   # Note: z-lab/Qwen3.6-27B-DFlash is auto-gated. First download will redirect
#   # you to accept the terms-of-use page (one click, instant approval).
#
# Start:
#   docker compose -f docker-compose.spark-xs.yml up -d
#   docker compose -f docker-compose.spark-xs.yml logs -f vllm
#
# First boot takes ~10–12 min (FlashInfer NVFP4 GEMM autotuner + CUDA-graph capture, all
# cached after first run). Subsequent restarts ~3–5 min.
#
# Test:
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"aeon-ultimate","messages":[{"role":"user","content":"Hello"}]}'

services:
  vllm:
    image: ghcr.io/aeon-7/vllm-aeon-ultimate-dflash:qwen36-v3
    container_name: aeon-ultimate-xs
    restart: unless-stopped
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1

    environment:
      # ─── Core vLLM ───
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # ─── GB10 / sm_121a runtime ───
      - TORCH_CUDA_ARCH_LIST=12.1a
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_MATMUL_PRECISION=high
      - NVIDIA_FORWARD_COMPAT=1
      - NVIDIA_DISABLE_REQUIRE=1

      # Required by PR #40191 for sm_121a-only builds — without this,
      # vllm._C_stable_libtorch.abi3.so fails to import.
      - ENABLE_NVFP4_SM100=0

      # ─── FP4 path selection ───
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_TEST_FORCE_FP8_MARLIN=0
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # XS-specific: explicitly select the patched CUTLASS NVFP4 GEMM backend.
      # This is a no-op on the v2.1 image (already the default) but makes the path
      # selection unambiguous.
      - VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass

    volumes:
      # XS multimodal body (modelopt format, ~21 GB) — replaces the regular NVFP4 body
      - ./models/aeon-ultimate-multimodal-nvfp4-mtp-xs:/models/xs
      # DFlash drafter v2 (z-lab 2026-04-27 push, ~3.46 GB)
      - ./models/dflash-drafter:/models/dflash-drafter

    command:
      - bash
      - -c
      - |
        exec vllm serve /models/xs \
          --served-model-name aeon-ultimate qwen36-ultimate aeon-fast aeon-deep aeon-ultimate-xs \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization modelopt \
          --kv-cache-dtype auto \
          --max-model-len 200000 \
          --max-num-seqs 16 \
          --max-num-batched-tokens 32768 \
          --gpu-memory-utilization 0.85 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --attention-backend flash_attn \
          --limit-mm-per-prompt '{"image": 4, "video": 2}' \
          --mm-encoder-tp-mode data \
          --mm-processor-cache-type shm \
          --speculative-config '{"method":"dflash","model":"/models/dflash-drafter","num_speculative_tokens":15}'
        # Notes on configuration choices:
        #   - --quantization modelopt — required for the XS body. The XS body ships in
        #     modelopt format (NVFP4 element + FP8 per-block + FP32 per-tensor scales).
        #     The previous regular NVFP4 body was compressed-tensors format; modelopt is
        #     the format vLLM serves through this code path.
        #   - --speculative-config '{"method":"dflash",...}' — DFlash with the external
        #     z-lab drafter. The XS body has a grafted MTP head in its safetensors but
        #     it is *not* used here. On Spark, DFlash beats MTP on the same body by
        #     +56 % median / +150 % peak — measured 2026-04-28. **Don't switch this
        #     to method:"qwen3_5_mtp" on Spark.**
        #   - --gpu-memory-utilization 0.85 is the validated cap for DGX Spark unified
        #     memory; 0.88+ thrashes. (RTX PRO 6000 has more headroom — it caps at 0.94.)
        #   - --max-num-batched-tokens 32768 is the ceiling. vLLM's inductor compile-range
        #     endpoint is [32768], so above 32k prefill falls back to eager mode.

    # GPU exposure — required on hosts where Docker's default-runtime is not 'nvidia'.
    # The DGX Spark base image ships with `default-runtime: nvidia` so this block is a
    # no-op there, but on most other Linux hosts (default-runtime: runc) the container
    # cannot see the GPU without it. Reported in issue #5; canonical Docker Compose v3
    # spec for GPU reservation.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
