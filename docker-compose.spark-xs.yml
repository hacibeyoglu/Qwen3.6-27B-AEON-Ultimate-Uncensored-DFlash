# docker-compose.spark-xs.yml — DGX Spark winning config (2026-06-11)
#
# Current recommendation:
#   image ghcr.io/aeon-7/aeon-vllm-ultimate:latest
#   XS multimodal body + DFlash n=10 + FlashInfer 0.6.11 + patched CUTLASS NVFP4
#
# Headline benchmark signal on DGX Spark (aeon-vllm-ultimate:latest, DFlash n=10):
#   Lead with ACCEPTANCE (stable across runs), not single-sample tok/s.
#   Long-context (~9k-token) draft acceptance: NEW 45.0% vs pre-fix image 19.7% = 2.3×.
#   Short-context c=1 acceptance by category (new, n=10, approximate):
#     Math ~50%, Reasoning ~50%, Extraction ~40%, Coding ~38%, Natural ~25%, Prose ~18%.
#   Short-context throughput is statistically UNCHANGED vs the prior image (the drafter's
#   sliding-window attention only engages past 2048 tokens); the win is specifically
#   long-context. Caveat: single / 3-round samples; short-context rankings are within noise.
#
# Why long-context drafting now holds up (the whole point of moving to :latest):
#   The z-lab Qwen3.6-27B DFlash drafter is a sliding-window model — 4 of its 5 layers use
#   sliding-window attention (window 2048). vLLM PR #40898 (in aeon-vllm-ultimate:latest)
#   runs those layers as proper SWA; earlier images ran them as full attention, so drafting
#   collapsed once context grew past ~2048 tokens. PR #41703 additionally makes
#   --enable-prefix-caching corruption-immune with DFlash. Net: long-context drafting holds
#   up; short-context (<2048, one window) is unchanged.
#
# The XS body has a grafted MTP head, but the Spark recipe intentionally uses
# external DFlash n=10. Keep this compose focused on the benchmarked path:
# XS body, modelopt quantization, CUTLASS NVFP4, CUDA graphs, Qwen3 reasoning,
# Qwen3-Coder tool calls, and the DFlash drafter.
#
# Image:       ghcr.io/aeon-7/aeon-vllm-ultimate:latest
#              (= tag :2026-06-11-pr41703; rollback tag :2026-06-04-pr44389)
# Hardware:    DGX Spark (NVIDIA GB10, 128 GB unified memory, sm_121a)
#
# Required downloads (run once):
#   hf auth login                                          # if not already authenticated
#   hf download AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS \
#     --local-dir ./models/aeon-ultimate-multimodal-nvfp4-mtp-xs
#   hf download z-lab/Qwen3.6-27B-DFlash \
#     --local-dir ./models/dflash-drafter
#   # Note: z-lab/Qwen3.6-27B-DFlash is auto-gated. First download will redirect
#   # you to accept the terms-of-use page (one click, instant approval).
#
# Start:
#   docker compose -f docker-compose.spark-xs.yml up -d
#   docker compose -f docker-compose.spark-xs.yml logs -f vllm
#
# First boot takes ~10–12 min (FlashInfer NVFP4 GEMM autotuner + CUDA-graph capture, all
# cached after first run). Subsequent restarts ~3–5 min.
#
# Test:
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"aeon-ultimate","messages":[{"role":"user","content":"Hello"}]}'

services:
  vllm:
    image: ghcr.io/aeon-7/aeon-vllm-ultimate:latest
    container_name: aeon-ultimate-xs
    restart: unless-stopped
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1

    environment:
      # ─── Core vLLM ───
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # ─── GB10 / sm_121a runtime ───
      - TORCH_CUDA_ARCH_LIST=12.1a
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_MATMUL_PRECISION=high
      - NVIDIA_FORWARD_COMPAT=1
      - NVIDIA_DISABLE_REQUIRE=1

      # Required by PR #40191 for sm_121a-only builds — without this,
      # vllm._C_stable_libtorch.abi3.so fails to import.
      - ENABLE_NVFP4_SM100=0

      # ─── FP4 path selection ───
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      - VLLM_TEST_FORCE_FP8_MARLIN=0
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # XS-specific: explicitly select the patched CUTLASS NVFP4 GEMM backend.
      - VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass

    volumes:
      # XS multimodal body (modelopt format, ~21 GB) — replaces the regular NVFP4 body
      - ./models/aeon-ultimate-multimodal-nvfp4-mtp-xs:/models/xs
      # DFlash drafter (~3.46 GB)
      - ./models/dflash-drafter:/models/dflash-drafter

    # The aeon-vllm-ultimate:latest image ENTRYPOINT is exec-form ["/bin/bash"]. Because
    # Docker CONCATENATES entrypoint + command, you must NOT also start `command:` with
    # `bash`: `command: [bash, -c, ...]` resolves to `/bin/bash bash -c ...`, where bash
    # treats the second `bash` as a script file and dies with
    # `/usr/bin/bash: /usr/bin/bash: cannot execute binary file` — even on a correct
    # aarch64 DGX Spark (this is NOT an arch mismatch; see issue #12). Fix: override the
    # entrypoint to `bash -lc` and pass ONLY the serve script as the command.
    # (Plain `docker run`: `--entrypoint /bin/bash <img> -lc "exec vllm serve ..."`,
    #  or `--entrypoint vllm <img> serve ...`.)
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        exec vllm serve /models/xs \
          --served-model-name aeon-ultimate qwen36-ultimate aeon-fast aeon-deep aeon-ultimate-xs \
          --host 0.0.0.0 --port 8000 \
          --tensor-parallel-size 1 \
          --dtype auto \
          --quantization modelopt \
          --kv-cache-dtype auto \
          --mamba-cache-dtype float32 \
          --max-model-len 256000 \
          --max-num-seqs 64 \
          --max-num-batched-tokens 16384 \
          --gpu-memory-utilization 0.70 \
          --enable-chunked-prefill \
          --enable-prefix-caching \
          --generation-config vllm \
          --load-format safetensors \
          --trust-remote-code \
          --enable-auto-tool-choice \
          --tool-call-parser qwen3_coder \
          --reasoning-parser qwen3 \
          --attention-backend flash_attn \
          --limit-mm-per-prompt '{"image": 4, "video": 2}' \
          --mm-encoder-tp-mode data \
          --mm-processor-cache-type shm \
          --mm-shm-cache-max-object-size-mb 256 \
          --speculative-config '{"method":"dflash","model":"/models/dflash-drafter","num_speculative_tokens":10}'
        # Notes on configuration choices:
        #   - --quantization modelopt — required for the XS body. The XS body ships in
        #     modelopt format (NVFP4 element + FP8 per-block + FP32 per-tensor scales).
        #     The previous regular NVFP4 body was compressed-tensors format; modelopt is
        #     the format vLLM serves through this code path.
        #   - --speculative-config '{"method":"dflash",...,"num_speculative_tokens":10}'
        #     — DFlash with the external z-lab drafter. n=10 is the validated default:
        #     the n=8/10/12/15 sweep found n=10 best for the voice/chat workload (top
        #     aggregate throughput + acceptance at parity single-stream); the old 12-token
        #     setting wins only at very long context. The drafter backend is the DEFAULT
        #     (do NOT add "attention_backend" to the spec-config — the default works for
        #     Qwen3.6 on this image, unlike Gemma which needed flash_attn). The XS body has
        #     a grafted MTP head in its safetensors but it is *not* used here; don't switch
        #     this to method:"qwen3_5_mtp" unless you are deliberately running an ablation.
        #   - --kv-cache-dtype auto keeps the KV cache at BF16, which the non-causal DFlash
        #     drafter requires. Do NOT pin --kv-cache-dtype to FP8/NVFP4 with DFlash.
        #   - --gpu-memory-utilization 0.70 is the SAFE DEFAULT — the Spark's unified
        #     memory thrashes when over-allocated (slowdowns, agent loops, even engine
        #     crashes, NOT a clean OOM). 0.70 leaves headroom for co-located ASR/TTS/
        #     embedding services + the OS. Raise to 0.85 ONLY if the LLM is the sole
        #     major GPU workload (and watch `free -h`); 0.88+ thrashes unified memory.
        #     (RTX PRO 6000 has dedicated VRAM and more headroom — it caps at 0.94.)
        #   - --max-num-batched-tokens 16384 is the ceiling. vLLM's inductor compile-range
        #     endpoint is [32768], so above 32k prefill falls back to eager mode.

    # GPU exposure — required on hosts where Docker's default-runtime is not 'nvidia'.
    # The DGX Spark base image ships with `default-runtime: nvidia` so this block is a
    # no-op there, but on most other Linux hosts (default-runtime: runc) the container
    # cannot see the GPU without it. Reported in issue #5; canonical Docker Compose v3
    # spec for GPU reservation.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
