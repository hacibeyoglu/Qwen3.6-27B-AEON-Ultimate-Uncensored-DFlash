# docker-compose.yml — Qwen3.6-27B-AEON-Ultimate-Uncensored-NVFP4 production deployment on DGX Spark
#
# This is the FULL production v2 config used to measure the benchmarks reported in README.md.
# Same image, same flags, same env, same speculative-decoding pipeline.
#
# Image:       ghcr.io/aeon-7/aeon-vllm-ultimate:latest
#                (= tag :2026-06-11-pr41703; rollback tag :2026-06-04-pr44389)
# Built on:    vLLM (sm_121a patched) + the SWA/DFlash long-context fixes:
#                #40898 run the DFlash drafter's sliding-window layers as proper SWA
#                #41703 --enable-prefix-caching made corruption-immune with DFlash
#                plus the AEON-7 sm_121a patch stack (SWA backend assert, mamba spec-decode
#                cache align, ENABLE_NVFP4_SM100=0 guard, unified spec-decode metrics,
#                TurboQuant K8V4 backend)
#              FlashInfer (b12x backend — SM121 NVFP4 GEMM path)
#              TurboQuant @ AEON-7/turboquant fix/cuda-graph-safe-qjl-powers
#
#              Why this image matters for DFlash long context: the z-lab Qwen3.6-27B
#              DFlash drafter is a sliding-window model — 4 of its 5 layers use
#              sliding-window attention (window 2048). PR #40898 (in
#              aeon-vllm-ultimate:latest) runs those layers as proper SWA; earlier
#              images ran them as full attention, so drafting collapsed once context
#              grew past ~2048 tokens. PR #41703 additionally makes
#              --enable-prefix-caching corruption-immune with DFlash. Net: long-context
#              drafting holds up; short-context (<2048, one window) is unchanged.
#
# Hardware:    DGX Spark (NVIDIA GB10, 128 GB unified memory, sm_121a)
#
# Pipeline:    NVFP4 main model + DFlash speculative decoding (n=10) via architecture-
#              matched drafter. Spec-decode acceptance averages high enough on this
#              dense 27B that DFlash is the recommended production path.
#
# Required downloads (run once):
#   hf auth login                                           # if not already authenticated
#   hf download AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-NVFP4 \
#     --local-dir ./models/aeon-ultimate-nvfp4
#   hf download z-lab/Qwen3.6-27B-DFlash \
#     --local-dir ./models/dflash-drafter
#   # Note: z-lab/Qwen3.6-27B-DFlash is auto-gated. First download will redirect
#   # you to accept the terms-of-use page (one click, instant approval).
#
# Start:
#   docker compose up -d
#   docker compose logs -f vllm
#
# Test:
#   curl http://localhost:8000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"aeon-ultimate","messages":[{"role":"user","content":"Hello"}]}'

services:
  vllm:
    image: ghcr.io/aeon-7/aeon-vllm-ultimate:latest
    container_name: aeon-ultimate
    restart: unless-stopped
    network_mode: host
    ipc: host
    ulimits:
      memlock: -1

    # The image ENTRYPOINT is /bin/bash, so we override it to `vllm` and pass
    # `serve ...` as the command. (Leaving the entrypoint as bash would run
    # `bash serve ...` and fail.)
    entrypoint: vllm

    environment:
      # ─── Core vLLM ───
      # Allow long max_model_len without hard ceiling assertion
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

      # ─── GB10 / sm_121a runtime ───
      - TORCH_CUDA_ARCH_LIST=12.1a
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - TORCH_MATMUL_PRECISION=high
      - NVIDIA_FORWARD_COMPAT=1
      - NVIDIA_DISABLE_REQUIRE=1

      # Required by PR #40191 for sm_121a-only builds — without this,
      # vllm._C_stable_libtorch.abi3.so fails to import (depends on SM100-only
      # mxfp4_experts_quant kernels that don't exist on SM121).
      - ENABLE_NVFP4_SM100=0

      # ─── FP4 path selection ───
      # Defensive: disable FlashInfer FP4 MoE auto-probe (this model is DENSE — no MoE)
      # to avoid SM121 PTX rejection log spam during boot.
      - VLLM_USE_FLASHINFER_MOE_FP4=0
      # Override baked test-image defaults; keep production NVFP4 path selection.
      - VLLM_TEST_FORCE_FP8_MARLIN=0
      # Use FlashInfer's CUDA top-k/top-p sampler for normal sampled requests.
      - VLLM_USE_FLASHINFER_SAMPLER=1
      # NOT setting (intentionally — would force fallback paths):
      #   VLLM_NVFP4_GEMM_BACKEND=marlin
      #   VLLM_TEST_FORCE_FP8_MARLIN=1

    volumes:
      # Main NVFP4 weights (~26 GB)
      - ./models/aeon-ultimate-nvfp4:/models/aeon-ultimate
      # DFlash drafter (~1 GB) for n=10 speculative decoding
      - ./models/dflash-drafter:/models/dflash-drafter

    # entrypoint is `vllm` (above); command starts at the `serve` subcommand.
    command:
      - serve
      - /models/aeon-ultimate
      - --served-model-name
      - aeon-ultimate
      - qwen36-ultimate
      - aeon-fast
      - aeon-deep
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --tensor-parallel-size
      - "1"
      - --dtype
      - auto
      - --quantization
      - compressed-tensors
      - --kv-cache-dtype
      - auto
      - --mamba-cache-dtype
      - float32
      - --max-model-len
      - "200000"
      - --max-num-seqs
      - "16"
      - --max-num-batched-tokens
      - "16384"
      - --gpu-memory-utilization
      - "0.85"
      - --enable-chunked-prefill
      - --no-enable-prefix-caching
      - --load-format
      - safetensors
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --reasoning-parser
      - qwen3
      - --attention-backend
      - flash_attn
      - --limit-mm-per-prompt
      - '{"image": 4, "video": 2}'
      - --mm-encoder-tp-mode
      - data
      - --mm-processor-cache-type
      - shm
      # DFlash speculative decoding: n=10, DEFAULT drafter attention backend.
      # Do NOT add "attention_backend" to the spec-config — the default works for
      # Qwen3.6 on aeon-vllm-ultimate:latest (unlike Gemma, which needed flash_attn).
      # Do NOT set --kv-cache-dtype to anything but BF16/auto: the non-causal DFlash
      # drafter requires BF16 KV.
      - --speculative-config
      - '{"method":"dflash","model":"/models/dflash-drafter","num_speculative_tokens":10}'

    # Notes on configuration choices:
    #   - DFlash n=10 — validated default. An n=8/10/12/15 sweep on aeon-vllm-ultimate:latest
    #     found n=10 best for the voice/chat workload (top aggregate throughput + acceptance
    #     at parity single-stream); the old 12-token setting wins only at very long context.
    #   - --mamba-cache-dtype float32 (more precise recurrent state, slightly higher acceptance
    #     than float16) + no --mamba-block-size (default lowers TTFT ~230->140ms vs 256).
    #     The architecture-matched drafter (z-lab/Qwen3.6-27B-DFlash) keeps
    #     spec-decode acceptance well above the break-even point where the drafter
    #     itself becomes overhead.
    #   - Drafter attention backend is left at DEFAULT (no attention_backend in the
    #     spec-config). The default path correctly runs the drafter's 4 sliding-window
    #     layers as proper SWA on aeon-vllm-ultimate:latest (PR #40898), so long-context
    #     drafting holds up; short-context (<2048, single window) is unchanged.
    #   - DynamicProposer (per-seq dynamic k) was attempted but Speculators v0.3 has
    #     a pydantic-incompatibility bug at import on pydantic 2.12. vLLM's native
    #     --speculative-config covers DFlash fine, so plain DFlash n=10 is the path.
    #   - TurboQuant K8V4 KV-cache compression (3.76×) was attempted but raises
    #     "TurboQuant KV cache is not supported for hybrid (attention + Mamba)
    #     models" — a deliberate guard in the vLLM integration code, not a kernel
    #     issue. v2.1+ may add --kv-cache-dtype-skip-layers to apply K8V4 to the
    #     16 full-attention layers only.
    #   - max-num-seqs is 16 (not 64) because the DFlash drafter's own KV state
    #     and the spec-decode scheduler's bookkeeping eat into the unified-memory
    #     budget. If you disable DFlash and run plain decode, raise to 32-64.

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s    # First boot loads weights + DFlash drafter + warmup

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
